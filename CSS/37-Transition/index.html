<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Transitions</h1>
    <div class="container">
        <div class="bloco">
            <h2>Transição</h2>
    <button class="b-transition">TRANSITION</button>
    <p>Realiza uma transição suave</p>
        </div>
    </div>
    
    <div class="bloco">
        <h2>Transition Duration</h2>
    <button class="b-duration">DURATION</button>
    <p>Define o tempo de duração da transição</p>
    </div>

    <div class="bloco">
        <h2>Transition Property</h2>
    <button class="b-property">PROPERTY</button>
    <p>Define a propriedade que será alterada</p>
    </div>
    
    <div class="bloco">
        <h2>Transition Delay</h2>
    <button class="b-delay">DELAY</button>
    <p>Acão que atrasa </p>
    </div>

    <div class="bloco">
        <h2>Transition Timing Function</h2>
    <button class="b-timing">TIMING</button>
    <p> Ação muda de velocidade</p>
        </div>

    <div class="bloco">
        <h2>Bloco Animado </h2>
    <div class="bloco-animado"></div>





</body>
</html>
