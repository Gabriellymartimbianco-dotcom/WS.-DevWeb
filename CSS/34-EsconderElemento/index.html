<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Forma de Esconder um elemento</h1>
    <h2>display: none</h2>
    <div class="exemplos">
    <div class="caixa normal">caixa</div>
    <div class="caixa display-none">Caixa Oculta</div>
    <div class="caixa normal">caixa</div>
    </div>

    <h2>Visibillity hidden</h2>
    <div class="exemplos">
    <div class="caixa normal">caixa</div>
    <div class="caixa visibility-hidden">Caixa Oculta</div>
    <div class="caixa normal">caixa</div>
    </div>

    <h2>Opacity 0</h2>
    <div class="exemplos">
    <div class="caixa normal">caixa</div>
    <div class="caixa opacity-zero">Caixa Oculta</div>
    <div class="caixa normal">caixa</div>
    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
    

</body>
</html>
