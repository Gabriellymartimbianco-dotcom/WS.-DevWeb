<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PseudoClasses</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>PseudoClasses</h1>
    <hr/>
    <h2>:Houver</h2>
    <button>Clique se quiser</button>
    <hr/>
    <h2>:focus</h2>
   <input type="text" placeholder="Clique aqui">
    <hr/>
   <h2>:active</h2>
   <button>Clique e Segure</button>
    <hr/>
   <h2>:visited</h2>
    <a href="https://www.google.com" target="_blank">Google</a>
  
   <hr/>
   <h2>:checkd</h2>
   <label for="">
    <input type="checkbox">
    </label>
    <hr/>
    <h2>:Disabled</h2>
    <input type="text" value="Desabilitado" disabled>
    <hr/>
    <h2>:First-child, :last-child, :nth-child(n)</h2>
    <ul>
        <li>primeiro</li>
        <li>segundo</li>
        <li>terceiro</li>
        <li>ultimo</li>
    </ul>

</body>
</html>
