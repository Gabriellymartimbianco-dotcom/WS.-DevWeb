<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <!--Crie uma página HTML para um portal de serviços online. Adicione uma imagem
com descrição utilizando o atributo alt, inclua informações extras usando title, crie
um botão sem texto visível utilizando aria-label, adicione uma mensagem
importante utilizando role="alert" e utilize aria-hidden="true" em um ícone
decorativo. Por fim, crie um link com tabindex para facilitar a navegação pelo
teclado. Estilize conforme sua escolha usando CSS-->


</head>
</html>
<html lang="pt-br">
<body>

    <main class="container">

        <h1>Portal Fácil</h1>

        <img src="imagens/servicos.jpg"
             alt="Pessoa utilizando um notebook para acessar serviços online."
             title="Portal de serviços digitais">

        <p title="Acesse diversos serviços de forma rápida.">
            Consulte documentos, solicite atendimentos e acompanhe protocolos sem sair de casa.
        </p>

        <button aria-label="Abrir menu"></button>

        <p role="alert">
            Atenção! O sistema ficará indisponível das 23h às 00h para manutenção.
        </p>

        <span aria-hidden="true" class="icone">⚙️</span>

        <br><br>

        <a href="#" tabindex="0">Acessar serviços</a>

    </main>

</body>
</html>

</body>
</html>
