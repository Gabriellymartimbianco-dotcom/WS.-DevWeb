</head>
<body>
    <body>
        <form action="">

        <label>Email:</label> <input type="email" id="email" placeholder="Digite seu email" required><br>
        <label >Código da Cidade:</label>
    <input type="password" name="codigo_secreto" placeholder="Digite o código secreto" >
    <input type="submit" value="Enviar">
    <br>
    <label for="limpar">Limpa dados do formulario </label>
    <input type="reset" value="limpar">
        </form>
    </body>
</body>
