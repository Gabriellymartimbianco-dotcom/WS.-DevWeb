<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campos de escolha</title>
    <link rel="stylesheet" href="style.css">
    <!--Crie um formulário para inscrição em um evento, com opções de checkbox para escolher os materiais necessários
e opções de radio para selecionar apenas uma forma de participação. Estilize conforme sua escolha usando CSS.-->
</head>
<body>
    <form action="">
        <h1>Inscrição para evento</h1>

        <h2>Materiais Necessários</h2>
        <input type="checkbox" name="materiais" id="caneta" value="caneta">
        <label for="caneta">Caneta</label>

        <input type="checkbox" name="materiais" id="caderno" value="caderno">
        <label for="caderno">Caderno</label>

        <input type="checkbox" name="materiais" id="laptop" value="laptop">
        <label for="laptop">Laptop</label>

        <br><br>

        <h2>Forma de Participação</h2>
        <input type="radio" name="participacao" id="presencial" value="presencial">
        <label for="presencial">Presencial</label>

        <input type="radio" name="participacao" id="online" value="online">
        <label for="online">Online</label>

        <br><br>

        <input type="submit" value="Inscrever-se">
</body>
</html>
