<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto longo e resultado</title>
    <link rel="stylesheet" href="style.css">
    <!--Crie um formulário de feedback para um cinema, com um campo <textarea> para
o usuário escrever sua opinião sobre o filme e um <output> exibindo a mensagem
“Feedback enviado com sucesso”. Estilize conforme sua escolha usando CSS.-->
</head>
<body>
    <form action="">
        <h1>Feedback do Cinema</h1>

        <label for="feedback">Escreva sua opinião sobre o filme:</label><br>
        <textarea id="feedback" name="feedback" rows="5" cols="50" placeholder="Digite seu feedback aqui..."></textarea><br><br>

        <input type="submit" value="Enviar Feedback">
        <br><br>
        <output name="resultado" for="feedback">Feedback enviado com sucesso</output>
    </form>
</body>
</html>
